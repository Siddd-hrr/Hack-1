name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure real env files are not tracked
        run: |
          set -euo pipefail
          tracked_env=$(git ls-files | grep -E '^(\.env($|\.)|deploy/\.env($|\.(dev|staging|prod)))' || true)
          allowed='^\.env\.example$|^deploy/\.env\.(dev|staging|prod)\.example$'

          if [ -n "$tracked_env" ]; then
            blocked=$(printf "%s\n" "$tracked_env" | grep -Ev "$allowed" || true)
            if [ -n "$blocked" ]; then
              echo "Forbidden env files are tracked:"
              echo "$blocked"
              exit 1
            fi
          fi

  backend-build:
    runs-on: ubuntu-latest
    needs: repo-hygiene
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Compile backend modules
        run: ./mvnw -DskipTests compile

  frontend-build:
    runs-on: ubuntu-latest
    needs: repo-hygiene
    defaults:
      run:
        working-directory: QPrint-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: QPrint-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
