server:
  port: 8086
spring:
  application:
    name: QPrint-otp
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: QPrint-otp
      auto-offset-reset: earliest
otp:
  ttl-seconds: ${OTP_TTL_SECONDS:600}
jwt:
  secret: ${JWT_SECRET:change-me-please-change-me-please-change-me}
  issuer: ${JWT_ISSUER:qprint-auth}
  audience: ${JWT_AUDIENCE:qprint-api}
management:
  endpoints:
    web:
      exposure:
        include: health,info
